# AI tools declaration
# ============================================================================
ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
 Used ChatGPT for architecture discussions, debugging Python code, 
 feature engineering ideas, documentation, and code review. All ranking logic, 
 feature engineering, scoring functions, and implementation decisions were verified 
 and integrated into the final solution. No candidate data was sent to external APIs 
 during inference.

# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  Built a modular candidate ranking pipeline combining semantic retrieval, feature engineering, behavioral scoring, and weighted ranking. Candidate profiles are converted into semantic documents and embedded using the BAAI/bge-small-en-v1.5 Sentence Transformer. Technical features include AI skills, production experience, career quality, Python expertise, embeddings, vector databases, and product-company exposure. Behavioral features model candidate availability, recruiter engagement, trust, and platform activity. A weighted ranking engine combines semantic similarity, technical score, behavior score, product fit, and experience fit to produce the final ranking. Natural-language reasoning is generated for every shortlisted candidate to explain why they were selected.

